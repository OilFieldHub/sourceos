databases:
  - name: oilfieldhub-db
    databaseName: oilfieldhub
    user: oilfieldhub
    plan: free

services:
  - type: web
    name: oilfieldhub-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build && npm run migration:run
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_TYPE
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: oilfieldhub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: oilfieldhub-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: oilfieldhub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: oilfieldhub-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: oilfieldhub-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: WEB_ORIGIN
        value: https://REPLACE-WITH-YOUR-NETLIFY-URL.netlify.app
