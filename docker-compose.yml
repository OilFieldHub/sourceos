services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: oilfieldhub
      POSTGRES_PASSWORD: oilfieldhub
      POSTGRES_DB: oilfieldhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
